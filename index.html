<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Course System</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
        }
        
        /* ดึงหน้าจอขึ้นไป 50px เพื่อซ่อนแถบหัวของ Google Script */
        iframe { 
            width: 100%; 
            height: calc(100% + 50px); 
            border: none; 
            margin-top: -50px; 
            display: block;
        }
    </style>
</head>
<body>
    <!-- ลิงก์ระบบคอร์สภาษาสเปนของคุณ -->
    <iframe src="https://script.google.com/macros/s/AKfycbyFWPeDVDxPstG8-jfV1kMHbSyLfMKOhDWuRPHtAHgIxTgXai83LAuFYh4BA6rbO9RhkA/exec"></iframe>
</body>
</html>
